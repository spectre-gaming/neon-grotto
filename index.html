const SHEET_NAME = "NeonGrottoInventory";
async function loadFromSheet(accessToken) {
  try {
    const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name%3D%27${SHEET_NAME}%27%20and%20mimeType%3D%27application%2Fvnd.google-apps.spreadsheet%27&fields=files(id%2Cname)`, {
      headers: {
        Authorization: `Bearer ${accessToken}`
      }
    });
    if (!listRes.ok) {
      const err = await listRes.json().catch(() => ({}));
      throw new Error(`Drive API ${listRes.status}: ${err?.error?.message || listRes.statusText}`);
    }
    const listData = await listRes.json();
    if (listData.files && listData.files.length > 0) {
      const sheetId = listData.files[0].id;
      const dataRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Sheet1`, {
        headers: {
          Authorization: `Bearer ${accessToken}`
        }
      });
      if (!dataRes.ok) {
        const err = await dataRes.json().catch(() => ({}));
        throw new Error(`Sheets API ${dataRes.status}: ${err?.error?.message || dataRes.statusText}`);
